# Interface Contract: Material Dimension
#
# Section 1) Scope
# - Canonical material list used across SD, MFA, coupling, and exogenous inputs.
#
# Section 2) Required keys
# - dimension: {name, symbol}
# - materials: non-empty list of material entries.
#
# Section 3) Entry guidance
# - Keep material ids stable; optional metadata fields (for example unit)
#   should remain consistent with exogenous datasets.

dimension:
  name: material
  symbol: m

materials:
  - name: tin
    unit: t
  - name: zinc
    unit: t
  - name: nickel
    unit: t
