# Interface Contract: Scenario Variant
#
# Section 1) Scope
# - File type: scenario variant loaded via includes.scenarios globs/files or inline run variants.
# - Applies to this file only; values are merged onto the active run baseline.
#
# Section 2) Required keys
# - name: unique variant id used by CLI --variant selection.
# - description: concise plain-language scenario intent.
# - implementation: list[str] describing how config changes map to model behavior.
#
# Section 3) Optional override blocks
# - sd_parameters, mfa_parameters, strategy, transition_policy, demand_transformation, shocks, dimension_overrides.
# - Any omitted block inherits active values from run baseline and prior merge layers.
#
# Section 4) SD temporal values
# - Applies to temporal-capable SD keys (for example sd_parameters.* and sd_heterogeneity.sd_parameters.*).
# - Form A scalar (constant for all modeled years):
#   key: 0.30
# - Form B year-gated step (switches at start_year):
#   key:
#     start_year: 2025
#     value: 0.35
#     before: 0.30   # optional; if omitted, baseline is injected at runtime
# - Form C full timeseries (explicit per-year values):
#   key: [0.30, 0.30, 0.31, ...]
# - Form D exogenous ramp reference (CSV-backed; resolves to temporal points at runtime):
#   key:
#     exogenous_ramp: data/scenario_profiles/mvp/example_variant.csv
#     # optional selectors for explicit routing:
#     # variant: example_variant
#     # block: mfa_parameters
#     # key: collection_rate
#     # material: nickel
#     # region: EU27
# - Full timeseries length must equal modeled year count (time.start_year..time.end_year).
# - Year-gates before report_start_year are shifted/clipped by reporting-phase enforcement.
#
name: import_squeeze_circular_ramp
description: External primary import squeeze followed by delayed circularity and policy ramp
  to test resilience recovery.
implementation:
  - Stress window (2025-2035) reduces primary output and net imports while demand pressure remains elevated.
  - Response window (from 2028) activates transition-policy adoption and demand-transformation efficiency.
  - Exogenous demand-transformation ramps are encoded inline as exogenous_ramp CSV references under demand_transformation keys.
  - Recovery is assessed through bottleneck relaxation, service stabilization, and circular-supply strengthening.

sd_parameters:
  capacity_pressure_shortage_weight:
    start_year: 2025
    value: 0.82
  bottleneck_scarcity_gain:
    start_year: 2025
    value: 0.24
  bottleneck_collection_sensitivity:
    start_year: 2025
    value: 0.12

transition_policy:
  enabled: true
  start_year: 2028
  adoption_target: 0.72
  adoption_lag_years: 5.0
  compliance_delay_years: 1.0
  demand_intensity_reduction_max: 0.14
  collection_uplift_max: 0.18
  recycling_yield_uplift_max: 0.1
  capacity_expansion_gain_uplift: 0.16
  bottleneck_relief_max: 0.28

demand_transformation:
  enabled: true
  service_activity_source: service_activity
  material_intensity_source: material_intensity
  service_activity_multiplier:
    start_year: 2025
    value: 1.05
  material_intensity_multiplier:
    exogenous_ramp: data/scenario_profiles/mvp/import_squeeze_circular_ramp.csv
  efficiency_improvement:
    exogenous_ramp: data/scenario_profiles/mvp/import_squeeze_circular_ramp.csv
  rebound_effect:
    start_year: 2028
    value: 0.17
  transition_adoption_weight: 0.7
  min_demand_multiplier: 0.65
  max_demand_multiplier: 1.25

shocks:
  demand_surge:
    start_year: 2025
    duration_years: 11
    multiplier: 1.15
  primary_refined_output:
    start_year: 2025
    duration_years: 11
    multiplier: 0.88
  primary_refined_net_imports:
    start_year: 2025
    duration_years: 11
    multiplier: 0.68

dimension_overrides:
  - name: nickel_eu27_deeper_import_squeeze
    materials: [nickel]
    regions: [EU27]
    shocks:
      primary_refined_output:
        start_year: 2025
        duration_years: 11
        multiplier: 0.82
      primary_refined_net_imports:
        start_year: 2025
        duration_years: 11
        multiplier: 0.55
    transition_policy:
      adoption_target: 0.8
      collection_uplift_max: 0.24
      capacity_expansion_gain_uplift: 0.2
      bottleneck_relief_max: 0.34
    demand_transformation:
      material_intensity_multiplier:
        exogenous_ramp: data/scenario_profiles/mvp/import_squeeze_circular_ramp.csv
      efficiency_improvement:
        start_year: 2028
        value: 0.13
  - name: row_slower_policy_ramp
    regions: [RoW]
    transition_policy:
      adoption_target: 0.58
      adoption_lag_years: 6.5
    demand_transformation:
      material_intensity_multiplier:
        start_year: 2028
        value: 0.94
